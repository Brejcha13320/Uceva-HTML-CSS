<!-- Indica al navegador qué versión de HTML se está usando. -->
<!DOCTYPE html>

<!-- La etiqueta <html> envuelve todo el contenido de la página. -->
<html>

<!-- La sección <head> contiene información del documento (no visible en la página): Título, Metadatos y Enlaces a estilos o scripts -->
<head>

  <!-- El <title> define el nombre que aparece en la pestaña del navegador. -->
  <title>Mi primera pagina web</title>

</head>

<!-- La sección <body> contiene el contenido visible en el navegador: Textos, Imágenes, Enlaces, Botones, etc. -->
<body>
  <h1>Bienvenidos</h1>
  <p>Esta es mi primera página web creada en HTML.</p>
</body>

</html>
