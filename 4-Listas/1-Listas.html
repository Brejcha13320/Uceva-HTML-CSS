<!-- 
Lista no ordenada
Se usa para listas de elementos sin un orden específico.
Cada elemento se define con <li>.
-->
<h2>Listo No Ordenada</h2>
<ul>
  <li>Manzana</li>
  <li>Banana</li>
  <li>Naranja</li>
</ul>

<hr>

<!-- 
Lista ordenada
Se usa para listas con un orden numérico o alfabético.
Cada elemento también se define con <li>.
-->
<h2>Lista Ordenada</h2>
<ol>
  <li>Primer paso</li>
  <li>Segundo paso</li>
  <li>Tercer paso</li>
</ol>

<hr>

<!--
Elemento de lista
La etiqueta <li> representa cada ítem dentro de una lista, ya sea ordenada (ol) o no ordenada (ul).
-->
<h2>Elemento de Lista</h2>
<ul>
  <li>Elemento A</li>
  <li>Elemento B</li>
</ul>

<hr>

<!-- 
Lista anidada
Se pueden crear listas dentro de otras listas para representar jerarquías.
-->
<h2>Lista Anidada</h2>
<ul>
  <li>Frutas
    <ul>
      <li>Manzana</li>
      <li>Banana</li>
    </ul>
  </li>
  <li>Verduras
    <ul>
      <li>Tomate</li>
      <li>Lechuga</li>
    </ul>
  </li>
</ul>
