<h2>Enlace Simple</h2>
<a href="https://www.google.com">Ir a Google</a>
<hr>

<!-- Enlace externo -->
<h2>Enlace Externo</h2>
<a href="https://www.google.com">Ir a Google</a>
<hr>

<!-- Enlace interno -->
<h2>Enlace Interno</h2>
<a href="index.html">Ir al Ejemplo de la Sección</a>
<hr>

<!--
Target: Indica cómo abrir el enlace:
_self → en la misma pestaña (por defecto).
_blank → en una nueva pestaña.
-->

<!-- Abrir en la misma pestaña -->
<h2>Abrir en la misma Pestaña</h2>
<a href="pagina2.html" target="_self">Abrir aquí</a>
<hr>

<!-- Abrir en nueva pestaña -->
<h2>Abrir otra Pestaña</h2>
<a href="https://www.youtube.com" target="_blank">Abrir en nueva pestaña</a>
<hr>

<!-- Secciones Internas -->
<h2>Secciones Internas</h2>
<!-- Enlace interno -->
<a href="#contacto">Ir a la sección de contacto</a>

<!-- Sección destino -->
<h2 id="contacto">Contacto</h2>
<p>Escríbeme a: ejemplo@correo.com</p>
