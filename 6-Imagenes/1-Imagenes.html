<!--
La etiqueta <img> se usa para insertar imágenes en una página web. Es una etiqueta vacía (no tiene cierre).

El atributo src indica la ruta o URL de la imagen. Puede ser un archivo local o una dirección externa.

El atributo alt define un texto alternativo que se muestra si la imagen no carga. También es importante para accesibilidad.

Los atributos width y height permiten ajustar el tamaño de la imagen en píxeles.
-->
<h2>Imagen Local</h2>
<img src="assets/html.jpg" width="500" height="300" alt="Descripción de la foto">

<hr>

<h2>Imagene Remota</h2>
<img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6" width="500" height="300" alt="Descripción de la foto">
