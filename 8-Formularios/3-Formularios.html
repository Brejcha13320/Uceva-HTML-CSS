<!DOCTYPE html>
<html>
<head>
  <title>Formulario de Perfil Completo</title>
</head>
<body>
  <!-- Título principal -->
  <h1>Formulario de Perfil Completo</h1>

  <!-- Formulario -->
  <form>
    <!-- Fecha -->
    <label for="fecha">Fecha de nacimiento:</label>
    <input type="date" id="fecha" name="fecha"><br><br>

    <!-- Hora -->
    <label for="hora">Hora preferida de contacto:</label>
    <input type="time" id="hora" name="hora"><br><br>

    <!-- Color -->
    <label for="color">Color favorito:</label>
    <input type="color" id="color" name="color"><br><br>

    <!-- Rango -->
    <label for="nivel">Nivel de satisfacción (0-10):</label>
    <input type="range" id="nivel" name="nivel" min="0" max="10"><br><br>

    <!-- URL -->
    <label for="web">Página web personal:</label>
    <input type="url" id="web" name="web"><br><br>

    <!-- Teléfono -->
    <label for="telefono">Teléfono:</label>
    <input type="tel" id="telefono" name="telefono"><br><br>

    <!-- Número -->
    <label for="edad">Edad:</label>
    <input type="number" id="edad" name="edad" min="1" max="100"><br><br>

    <!-- Botón de envío -->
    <button type="submit">Guardar Perfil</button>
  </form>
</body>
</html>
