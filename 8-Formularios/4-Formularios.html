<!DOCTYPE html>
<html>
<head>
  <title>Formulario Validado</title>
</head>
<body>
  <!-- Título principal -->
  <h1>Registro con Validaciones HTML5</h1>

  <!-- Formulario -->
  <form>
    <!-- Campo obligatorio -->
    <label for="usuario">Usuario:</label>
    <input type="text" id="usuario" name="usuario" required><br><br>

    <!-- Contraseña con longitud mínima y máxima -->
    <label for="clave">Contraseña (6-12 caracteres):</label>
    <input type="password" id="clave" name="clave" minlength="6" maxlength="12" required><br><br>

    <!-- Edad con rango -->
    <label for="edad">Edad (18-99):</label>
    <input type="number" id="edad" name="edad" min="18" max="99" required><br><br>

    <!-- Correo electrónico obligatorio -->
    <label for="correo">Correo electrónico:</label>
    <input type="email" id="correo" name="correo" required><br><br>

    <!-- Teléfono con patrón -->
    <label for="telefono">Teléfono (10 dígitos):</label>
    <input type="tel" id="telefono" name="telefono" pattern="[0-9]{10}" required><br><br>

    <!-- Botón de envío -->
    <button type="submit">Registrar</button>
  </form>
</body>
</html>
