<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Permite mostrar caracteres especiales -->
    <meta charset="UTF-8">

    <!-- Título que aparece en la pestaña -->
    <title>Ejercicios</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

     <h1>Ejercicios del Curso CSS</h1>

    <!-- ===================================================== -->
    <!-- EJERCICIO 1 - SELECTORES CSS -->
    <!-- ===================================================== -->

    <!--

    Objetivo:
    Aplicar selectores por etiqueta, clase e id.

    Crear una página que contenga:

    1. Un título principal.
    2. Tres párrafos.
    3. Un párrafo debe utilizar una clase.
    4. Un párrafo debe utilizar un id.

    Aplicar:

    - Color diferente a cada elemento.
    - Tamaños de texto distintos.

    Conceptos evaluados:

    - Selector por etiqueta.
    - Selector por clase.
    - Selector por id.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 2 - COLORES Y FONDOS -->
    <!-- ===================================================== -->

    <!--

    Objetivo:
    Personalizar la apariencia visual.

    Crear tres cajas.

    Requisitos:

    - Cada caja debe tener un color diferente.
    - Agregar color al texto.
    - Agregar un fondo para la página.
    - Definir ancho y alto.

    Conceptos evaluados:

    - color
    - background-color
    - width
    - height

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 3 - TIPOGRAFÍA -->
    <!-- ===================================================== -->

    <!--

    Objetivo:
    Diseñar una noticia.

    Crear:

    - Un título principal.
    - Un subtítulo.
    - Dos párrafos.

    Aplicar:

    - font-family
    - font-size
    - font-weight
    - text-align
    - text-transform

    Conceptos evaluados:

    Diseño y jerarquía visual.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 4 - BOX MODEL -->
    <!-- ===================================================== -->

    <!--

    Objetivo:
    Aplicar el modelo de cajas.

    Crear una tarjeta personal.

    Debe contener:

    - Nombre.
    - Carrera.
    - Ciudad.

    Aplicar:

    - border
    - padding
    - margin
    - width
    - height

    Conceptos evaluados:

    Modelo de cajas completo.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 5 - DISPLAY -->
    <!-- ===================================================== -->

    <!--

    Objetivo:
    Comprender el comportamiento
    de los elementos.

    Crear:

    - Tres div.
    - Tres span.

    Realizar pruebas utilizando:

    - block
    - inline
    - inline-block
    - none

    Explicar mediante comentarios
    las diferencias observadas.

    Conceptos evaluados:

    Propiedad display.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 6 - FLEXBOX -->
    <!-- ===================================================== -->

    <!--

    Objetivo:
    Crear un menú de navegación.

    Debe contener:

    - Inicio
    - Nosotros
    - Servicios
    - Contacto

    Utilizar:

    - display:flex
    - justify-content
    - align-items
    - gap

    Conceptos evaluados:

    Distribución horizontal
    utilizando Flexbox.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 7 - GRID -->
    <!-- ===================================================== -->

    <!--

    Objetivo:
    Crear una galería de productos.

    Debe contener:

    - 6 productos.
    - 3 columnas.
    - Separación entre elementos.

    Utilizar:

    - display:grid
    - grid-template-columns
    - gap

    Conceptos evaluados:

    Distribución mediante Grid.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 8 - RESPONSIVE -->
    <!-- ===================================================== -->

    <!--

    Objetivo:
    Adaptar un diseño para dispositivos móviles.

    Crear:

    - Un contenedor principal.
    - Un encabezado.
    - Un contenido.

    Aplicar:

    - width fija en escritorio.
    - width 100% en móvil.

    Utilizar:

    @media(max-width:768px)

    Conceptos evaluados:

    Responsive Design.

    -->

</body>

</html>
