<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Permite mostrar caracteres especiales -->
    <meta charset="UTF-8">

    <!-- Título que aparece en la pestaña -->
    <title>HTML Semantico</title>

</head>

<body>

    <!-- Encabezado principal del sitio web. Normalmente contiene: Logo, Título, Información principal, etc. -->
    <header>
        <h1>Mi Blog</h1>
    </header>

    <!-- Menú de navegación. Contiene enlaces hacia otras secciones. -->
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Cursos</a>
    </nav>

    <!-- main representa el contenido principal de la página. Debe existir uno por documento. -->
    <main>
         <!-- section agrupa contenido relacionado. -->
        <section>
            <h2>Noticias</h2>
        </section>
        <!-- article representa contenido independiente. Ejemplos: Artículos, Publicaciones, Noticias, etc. -->
        <article>
            <h3>Artículo</h3>
        </article>
    </main>

    <!-- aside contiene información secundaria. Ejemplos: Publicidad, Menús laterales, Enlaces relacionados, etc. -->
    <aside>
        Publicidad
    </aside>

     <!-- Pie de página. Generalmente contiene: Derechos de autor, Contacto, Redes sociales, etc. -->
    <footer>
        © 2026 Programación en Ambiente Web I
    </footer>

</body>

</html>
