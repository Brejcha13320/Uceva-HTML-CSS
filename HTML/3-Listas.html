<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Permite mostrar caracteres especiales -->
    <meta charset="UTF-8">

    <!-- Título que aparece en la pestaña -->
    <title>Listas</title>

</head>

<body>

    <!-- ul significa Unordered List (Lista desordenada) -->
    <ul>
        <!-- li significa List Item (Elemento de la lista) -->
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <!-- ol significa Ordered List (Lista ordenada) -->
    <ol>
        <li>Analizar problema</li>
        <li>Diseñar solución</li>
        <li>Programar</li>
        <li>Probar</li>
    </ol>

    <ul>
        <li>
            Programación Web
            <!-- Lista dentro de otro elemento -->
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>
        </li>
        <li>
            Bases de Datos
            <ul>
                <li>MySQL</li>
                <li>PostgreSQL</li>
            </ul>
        </li>
    </ul>

</body>

</html>
