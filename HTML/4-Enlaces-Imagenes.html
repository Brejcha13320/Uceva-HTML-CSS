<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Permite mostrar caracteres especiales -->
    <meta charset="UTF-8">

    <!-- Título que aparece en la pestaña -->
    <title>Enlaces y Imagenes</title>

</head>

<body>

    <!-- href indica la dirección a donde navegar -->

    <!-- Abrir en la misma pestaña -->
    <h2>Abrir en la Pestaña</h2>
    <a href="https://www.google.com"> Ir a Google </a>

    <!-- Abrir en la misma pestaña -->
    <h2>Abrir en la misma Pestaña</h2>
    <a href="https://www.google.com" target="_self">Abrir aquí</a>

    <!-- Abrir en nueva pestaña -->
    <h2>Abrir otra Pestaña</h2>
    <a href="https://www.google.com" target="_blank">Abrir en nueva pestaña</a>

    <br><br>

    <!--src = ruta de la imagen, alt = texto alternativo, width = ancho -->
    <img src="https://beecrowd.com/wp-content/uploads/2024/04/2022-12-20-HTML5.jpg" alt="Paisaje Natural" width="400">

</body>

</html>
