<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Ejercicios del Curso HTML</title>

</head>

<body>

    <h1>Ejercicios de Programación en Ambiente Web I</h1>

    <!-- ===================================================== -->
    <!-- EJERCICIO 1 - ESTRUCTURA BÁSICA HTML -->
    <!-- ===================================================== -->

    <!--

    Crear una página que contenga:

    1. Un título principal utilizando h1.
    2. Un párrafo con una presentación personal.
    3. Un segundo párrafo indicando la carrera que estudias.
    4. Una frase motivacional.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 2 - TEXTO Y FORMATO -->
    <!-- ===================================================== -->

    <!--

    Crear una página que incluya:

    1. Un h1 con tu nombre.
    2. Un h2 con tu carrera.
    3. Un h3 con tu ciudad.
    4. Un párrafo descriptivo.
    5. Un texto usando strong.
    6. Un texto usando em.
    7. Un texto usando mark.
    8. Un texto usando u.
    9. Un texto usando small.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 3 - LISTAS -->
    <!-- ===================================================== -->

    <!--

    Construir la siguiente estructura:

    Lenguajes de Programación

        Frontend
            HTML
            CSS
            JavaScript

        Backend
            PHP
            Python
            Java

    Requisitos:

    - Utilizar listas anidadas.
    - Agregar un título principal.
    - Agregar una descripción utilizando un párrafo.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 4 - ENLACES E IMÁGENES -->
    <!-- ===================================================== -->

    <!--

    Crear una galería personal.

    Debe contener:

    1. Tres imágenes.
    2. Tres enlaces externos.
    3. Un título principal.
    4. Una descripción de cada imagen.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 5 - TABLAS -->
    <!-- ===================================================== -->

    <!--

    Crear una tabla de horario académico.

    Debe incluir:

    - thead
    - tbody
    - tfoot
    - colspan
    - rowspan

    Información mínima:

    Día
    Materia
    Horario

    Mostrar al final el total de materias.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 6 - FORMULARIOS BÁSICOS -->
    <!-- ===================================================== -->

    <!--

    Crear un formulario de registro.

    Campos:

    - Nombre
    - Apellido
    - Correo
    - Contraseña

    Agregar un botón de envío.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 7 - FORMULARIOS AVANZADOS -->
    <!-- ===================================================== -->

    <!--

    Crear un formulario de inscripción universitaria.

    Debe contener:

    - Nombre
    - Correo
    - Edad
    - Fecha de nacimiento
    - Carrera (select)
    - Género (radio)
    - Habilidades (checkbox)
    - Foto (file)
    - Comentarios (textarea)

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 8 - HTML SEMÁNTICO -->
    <!-- ===================================================== -->

    <!--

    Crear la estructura de un periódico digital.

    Debe incluir:

    - header
    - nav
    - main
    - section
    - article
    - aside
    - footer

    Agregar contenido de ejemplo en cada sección.

    -->



    <!-- ===================================================== -->
    <!-- EJERCICIO 9 - MULTIMEDIA -->
    <!-- ===================================================== -->

    <!--

    Crear una página multimedia.

    Debe contener:

    - Un audio local.
    - Un video local.
    - Un video de YouTube.
    - Un título principal.
    - Una descripción para cada recurso.

    -->



    <!-- ===================================================== -->
    <!-- PROYECTO FINAL -->
    <!-- ===================================================== -->

    <!--

    Desarrollar un sitio web personal.

    El sitio debe incluir:

    1. HTML semántico.
    2. Encabezados.
    3. Párrafos.
    4. Listas.
    5. Imágenes.
    6. Enlaces.
    7. Tabla avanzada.
    8. Formulario.
    9. Audio.
    10. Video.
    11. Comentarios explicando el código.

    Secciones sugeridas:

    - Inicio
    - Sobre mí
    - Estudios
    - Habilidades
    - Proyectos
    - Galería
    - Contacto

    Buenas prácticas:

    - Código indentado.
    - Comentarios descriptivos.
    - Uso correcto de etiquetas semánticas.
    - Organización clara del contenido.

    -->

</body>

</html>
